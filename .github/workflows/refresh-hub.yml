name: Refresh EEA Pages Hub

on:
  workflow_dispatch:
  schedule:
    # Weekly refresh (Mondays 04:10 UTC)
    - cron: "10 4 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: EntEthAlliance
          SELF_REPO: EntEthAlliance/EntEthAlliance.github.io
          EXCLUDE_REPOS: EntEthAlliance/wg-ethereum-institute
          DAYS_ACTIVE: "183"
        run: |
          python3 scripts/generate_hub.py > index.html

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: weekly refresh hub index"
          git push
